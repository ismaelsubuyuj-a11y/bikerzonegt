<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biker Zone Guatemala</title>

<!-- 🔒 SEGURIDAD -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="no-referrer-when-downgrade">

<!-- 🟢 FAVICON -->
<link rel="icon" href="logo.png">

<style>

/* VARIABLES */
:root{
    --bg:#ffffff;
    --card:#f2f2f2;
    --text:#000;
    --accent:#FFD700;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#0b0b0b;
    --card:#111;
    --text:#fff;
}
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
}

.logo{
    width:160px;
}

/* NAV */
.nav{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    background:var(--card);
    padding:10px;
}

.nav a{
    text-decoration:none;
    color:var(--text);
    font-weight:bold;
}

/* GRID */
.catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.info{
    padding:10px;
}

/* VENDIDA */
.sold{
    position:absolute;
    top:10px;
    left:10px;
    background:red;
    color:white;
    padding:5px;
    border-radius:8px;
    font-size:12px;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    padding:10px;
}

.modal-content{
    width:100%;
    max-width:400px;
    max-height:90vh;
    overflow-y:auto;
    background:var(--card);
    border-radius:15px;
    padding:15px;
}

/* SLIDER */
.slider img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.controls{
    display:flex;
}

.controls button{
    flex:1;
    margin:5px;
    padding:10px;
}

/* BOTON */
.btn{
    display:block;
    background:#25D366;
    text-align:center;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    color:gray;
    border-top:1px solid rgba(255,255,255,0.1);
}

.footer a{
    color:#FFD700;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
    <p>Más que motos, experiencias</p>
</div>

<div class="nav">
    <a href="#">Inicio</a>
    <a href="#catalogo">Catálogo</a>
    <a href="contacto.html">Contacto</a>
</div>

<div id="catalogo" class="catalogo"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="cursor:pointer">✖</span>

        <div class="slider">
            <img id="slide">
        </div>

        <div class="controls">
            <button onclick="changeSlide(-1)">⬅</button>
            <button onclick="changeSlide(1)">➡</button>
        </div>

        <h3 id="titulo"></h3>
        <p id="precio"></p>

        <div id="datos"></div>

        <a id="btnWhats" class="btn" target="_blank" rel="noopener noreferrer">
            Cotizar por WhatsApp
        </a>
    </div>
</div>

<script>

/* 🏍️ AGREGA TUS MOTOS */
let motos = [

{
    nombre:"Yamaha MT07 2019",
    precio:54500,
    vendido:false,
    imgs:["img/MT1.jpg","img/MT2.jpg","img/MT3.jpg"],
    datos:[
        "Kilometraje: 12,000 km",
        "Servicio: Reciente",
        "Llantas: 90%",
        "Motor: Excelente"
    ]
}

];

/* GENERAR */
const contenedor=document.getElementById("catalogo");

motos.forEach((m,i)=>{
    contenedor.innerHTML+=`
    <div class="card" onclick="openModal(${i})">
        ${m.vendido ? '<div class="sold">VENDIDA</div>' : ''}
        <img src="${m.imgs[0]}">
        <div class="info">
            <h3>${m.nombre}</h3>
            <p>Q${m.precio}</p>
        </div>
    </div>`;
});

/* MODAL */
let current=0;
let actual=null;
let intervalo;

function openModal(i){
    actual=motos[i];

    document.getElementById("modal").style.display="flex";
    document.getElementById("titulo").innerText=actual.nombre;
    document.getElementById("precio").innerText="Q"+actual.precio;

    let html="";
    actual.datos.forEach(d=> html+="<p>"+d+"</p>");
    document.getElementById("datos").innerHTML=html;

    current=0;
    showSlide();
    autoSlide();

    let numero="50212345678"; // 🔥 TU NUMERO REAL
    let msg="Hola, quiero cotizar la "+actual.nombre+" con precio Q"+actual.precio;

    document.getElementById("btnWhats").href=
        "https://wa.me/"+numero+"?text="+encodeURIComponent(msg);
}

function showSlide(){
    document.getElementById("slide").src=actual.imgs[current];
}

function changeSlide(n){
    current+=n;
    if(current<0) current=actual.imgs.length-1;
    if(current>=actual.imgs.length) current=0;
    showSlide();
}

function autoSlide(){
    clearInterval(intervalo);
    intervalo=setInterval(()=>changeSlide(1),3000);
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    clearInterval(intervalo);
}

</script>

<footer class="footer">
    © <span id="year"></span> Biker Zone Guatemala • Todos los derechos reservados <br><br>
    <a href="privacidad.html">Aviso de Privacidad</a> | 
    <a href="terminos.html">Términos y Condiciones</a>
</footer>

<script>
document.getElementById("year").innerText = new Date().getFullYear();
</script>

</body>
</html>
